name: Build python-olm for aarch64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libolm-dev libolm3 python3-dev python3-pip make gcc

      - name: Show toolchain
        run: |
          gcc --version
          make --version
          pkg-config --cflags --libs olm
          dpkg -l | grep olm

      - name: Build wheel
        run: |
          mkdir -p wheels
          pip3 wheel --no-deps --wheel-dir wheels python-olm
          ls -la wheels/

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-olm-aarch64
          path: wheels/*.whl
